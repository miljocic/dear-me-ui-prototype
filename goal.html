<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add a Goal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body style="font-family: 'Fredoka', sans-serif; background-color: #f7a070;">

  <div class="container py-4">
    <div class="p-3 mb-4 rounded-3" style="background-color: #ba4f3d; position: relative;">
      <h2 class="text-white text-center fw-bold mb-0">
        <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 1.5rem;">&#x2190;</span> Add a goal
      </h2>
    </div>

    <div class="position-relative p-4 rounded-3 mb-4" style="background-color: #fce3b1; min-height: 200px;">
      <textarea class="form-control" placeholder="Type your goal here...." style="height: 100%; background-color: transparent; border: none; font-size: 1.1rem; padding: 0; resize: none;"></textarea>
      <small class="text-muted" style="position: absolute; top: 10px; right: 10px;">Offline</small>
    </div>

    <div class="text-center mb-4">
      <button class="btn px-5 rounded-pill" style="background-color: #f7a070; color: white; font-weight: bold; font-size: 1.2rem; padding: 10px 40px;">Save</button>
    </div>

    <div class="text-center mb-5">
      <div class="d-inline-block p-2 px-4 rounded-pill" style="background-color: #79c8d5; color: white; font-weight: bold;">
        I believe in you!
      </div>
    </div>


    <div class="row text-center mt-auto pb-3 pt-4" style="background-color: #2b7a8a; border-top-left-radius: 20px; border-top-right-radius: 20px; position: fixed; bottom: 0; left: 0; right: 0; padding-top: 15px; padding-bottom: 5px;">
      <div class="col-3">
        <button class="btn w-100 rounded-pill shadow-sm" style="background-color: #2b7a8a; color: white; border: none;">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/user-male-circle.png" alt="Profile icon" style="width: 24px; height: 24px;">
        </button>
      </div>
      <div class="col-3">
        <button class="btn w-100 rounded-pill shadow-sm" style="background-color: #2b7a8a; color: white; border: none;">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/calendar--v1.png" alt="Calendar icon" style="width: 24px; height: 24px;">
        </button>
      </div>
      <div class="col-3">
        <button class="btn w-100 rounded-pill shadow-sm" style="background-color: #2b7a8a; color: white; border: none;">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/bar-chart.png" alt="Stats icon" style="width: 24px; height: 24px;">
        </button>
      </div>
      <div class="col-3">
        <button class="btn w-100 rounded-pill shadow-sm" style="background-color: #2b7a8a; color: white; border: none;">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/person-male.png" alt="Community icon" style="width: 24px; height: 24px;">
        </button>
      </div>
    </div>
  </div>

</body>
</html>
